<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#17202a" />
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
    .title { font-size: 20px; font-weight: 700; }
    .label { font-size: 13px; }
    .small { font-size: 12px; fill: #566573; }
  </style>
<rect x="0" y="0" width="760" height="360" fill="#ffffff" />
<text class="title" x="48" y="32">HNLQ as two's-complement digit expansion</text>
<rect x="94" y="126" width="116" height="70" rx="7" fill="#f8f9f9" stroke="#2f6f9f" stroke-width="2" />
<text class="label" text-anchor="middle" x="152" y="154">c~_b0</text>
<text class="small" text-anchor="middle" x="152" y="178">weight 1</text>
<text class="title" x="224" y="170">+</text>
<rect x="248" y="126" width="116" height="70" rx="7" fill="#f8f9f9" stroke="#2f6f9f" stroke-width="2" />
<text class="label" text-anchor="middle" x="306" y="154">c~_b1</text>
<text class="small" text-anchor="middle" x="306" y="178">weight 2</text>
<text class="title" x="378" y="170">+</text>
<rect x="402" y="126" width="116" height="70" rx="7" fill="#f8f9f9" stroke="#2f6f9f" stroke-width="2" />
<text class="label" text-anchor="middle" x="460" y="154">c~_b2</text>
<text class="small" text-anchor="middle" x="460" y="178">weight 4</text>
<text class="title" x="532" y="170">+</text>
<rect x="556" y="126" width="116" height="70" rx="7" fill="#f8f9f9" stroke="#2f6f9f" stroke-width="2" />
<text class="label" text-anchor="middle" x="614" y="154">c~_b3</text>
<text class="small" text-anchor="middle" x="614" y="178">weight -8</text>
<text class="small" x="80" y="254">scaled reconstruction = c~_b0 + 2 c~_b1 + 4 c~_b2 - 8 c~_b3</text>
<text class="small" x="80" y="334">Divide by beta to return from scaled lattice coordinates to weight units.</text>
</svg>
