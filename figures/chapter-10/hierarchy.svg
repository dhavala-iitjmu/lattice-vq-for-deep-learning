<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#17202a" />
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
    .title { font-size: 20px; font-weight: 700; }
    .label { font-size: 13px; }
    .small { font-size: 12px; fill: #566573; }
  </style>
<rect x="0" y="0" width="760" height="360" fill="#ffffff" />
<text class="title" x="48" y="32">Four hierarchy levels reuse one small codebook</text>
<rect x="70" y="96" width="110" height="64" rx="7" fill="#f8f9f9" stroke="#2f6f9f" stroke-width="2" />
<text class="label" text-anchor="middle" x="125" y="123">level 0</text>
<text class="small" text-anchor="middle" x="125" y="145">index b0</text>
<line x1="125" y1="160" x2="365" y2="226" stroke="#17202a" stroke-width="2" marker-end="url(#arrow)" />
<rect x="220" y="96" width="110" height="64" rx="7" fill="#f8f9f9" stroke="#2f6f9f" stroke-width="2" />
<text class="label" text-anchor="middle" x="275" y="123">level 1</text>
<text class="small" text-anchor="middle" x="275" y="145">index b1</text>
<line x1="275" y1="160" x2="365" y2="226" stroke="#17202a" stroke-width="2" marker-end="url(#arrow)" />
<rect x="370" y="96" width="110" height="64" rx="7" fill="#f8f9f9" stroke="#2f6f9f" stroke-width="2" />
<text class="label" text-anchor="middle" x="425" y="123">level 2</text>
<text class="small" text-anchor="middle" x="425" y="145">index b2</text>
<line x1="425" y1="160" x2="365" y2="226" stroke="#17202a" stroke-width="2" marker-end="url(#arrow)" />
<rect x="520" y="96" width="110" height="64" rx="7" fill="#f8f9f9" stroke="#2f6f9f" stroke-width="2" />
<text class="label" text-anchor="middle" x="575" y="123">level 3</text>
<text class="small" text-anchor="middle" x="575" y="145">index b3</text>
<line x1="575" y1="160" x2="365" y2="226" stroke="#17202a" stroke-width="2" marker-end="url(#arrow)" />
<rect x="278" y="226" width="174" height="62" rx="7" fill="#2e8b57" opacity="0.16" stroke="#2e8b57" stroke-width="2" />
<text class="label" text-anchor="middle" x="365" y="253">shared A2 table</text>
<text class="small" text-anchor="middle" x="365" y="273">16 representatives</text>
<text class="small" x="64" y="334">The effective codebook has many index sequences, but each lookup uses the same small table.</text>
</svg>
