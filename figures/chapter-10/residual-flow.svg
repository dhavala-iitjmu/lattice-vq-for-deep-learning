<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#17202a" />
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
    .title { font-size: 20px; font-weight: 700; }
    .label { font-size: 13px; }
    .small { font-size: 12px; fill: #566573; }
  </style>
<rect x="0" y="0" width="760" height="360" fill="#ffffff" />
<text class="title" x="48" y="32">Digit extraction: reduce mod q, then divide by q</text>
<rect x="70" y="134" width="126" height="50" rx="7" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" text-anchor="middle" x="133" y="164">residual r_m</text>
<rect x="230" y="90" width="126" height="50" rx="7" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" text-anchor="middle" x="293" y="120">emit index b_m</text>
<rect x="230" y="178" width="126" height="50" rx="7" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" text-anchor="middle" x="293" y="208">subtract digit</text>
<rect x="390" y="178" width="126" height="50" rx="7" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" text-anchor="middle" x="453" y="208">divide by q</text>
<rect x="560" y="178" width="126" height="50" rx="7" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" text-anchor="middle" x="623" y="208">quotient z_{m+1}</text>
<line x1="196" y1="159" x2="230" y2="203" stroke="#17202a" stroke-width="3" marker-end="url(#arrow)" />
<line x1="293" y1="140" x2="293" y2="178" stroke="#17202a" stroke-width="3" marker-end="url(#arrow)" />
<line x1="356" y1="203" x2="390" y2="203" stroke="#17202a" stroke-width="3" marker-end="url(#arrow)" />
<line x1="516" y1="203" x2="560" y2="203" stroke="#17202a" stroke-width="3" marker-end="url(#arrow)" />
<text class="small" x="64" y="334">Each pass peels one base-q digit off the generator coefficients.</text>
</svg>
