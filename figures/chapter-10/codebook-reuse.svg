<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#17202a" />
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
    .title { font-size: 20px; font-weight: 700; }
    .label { font-size: 13px; }
    .small { font-size: 12px; fill: #566573; }
  </style>
<rect x="0" y="0" width="760" height="360" fill="#ffffff" />
<text class="title" x="48" y="32">Small tables replace one materialized huge table</text>
<rect x="76" y="104" width="214" height="126" rx="7" fill="#d9822b" opacity="0.12" stroke="#d9822b" stroke-width="2" />
<text class="label" text-anchor="middle" x="183" y="146">flat effective table</text>
<text class="small" text-anchor="middle" x="183" y="170">65,536 entries</text>
<text class="small" text-anchor="middle" x="183" y="194">large LUTs</text>
<line x1="316" y1="166" x2="438" y2="166" stroke="#17202a" stroke-width="3" marker-end="url(#arrow)" />
<rect x="464" y="80" width="170" height="36" rx="6" fill="#f8f9f9" stroke="#2e8b57" stroke-width="2" />
<text class="small" text-anchor="middle" x="549" y="103">level 0: 16 entries</text>
<rect x="464" y="132" width="170" height="36" rx="6" fill="#f8f9f9" stroke="#2e8b57" stroke-width="2" />
<text class="small" text-anchor="middle" x="549" y="155">level 1: 16 entries</text>
<rect x="464" y="184" width="170" height="36" rx="6" fill="#f8f9f9" stroke="#2e8b57" stroke-width="2" />
<text class="small" text-anchor="middle" x="549" y="207">level 2: 16 entries</text>
<rect x="464" y="236" width="170" height="36" rx="6" fill="#f8f9f9" stroke="#2e8b57" stroke-width="2" />
<text class="small" text-anchor="middle" x="549" y="259">level 3: 16 entries</text>
<text class="small" x="64" y="334">Chapter 11 uses the small per-level table to build one-sided dot-product lookup tables.</text>
</svg>
