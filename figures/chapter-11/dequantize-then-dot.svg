<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#17202a" />
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
    .title { font-size: 20px; font-weight: 700; }
    .label { font-size: 13px; }
    .small { font-size: 12px; fill: #566573; }
  </style>
<rect x="0" y="0" width="760" height="360" fill="#ffffff" />
<text class="title" x="48" y="32">Baseline: dequantize weights, then dot</text>
<rect x="60" y="132" width="124" height="56" rx="7" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" text-anchor="middle" x="122.0" y="165.0">HNLQ indices</text>
<rect x="220" y="132" width="124" height="56" rx="7" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" text-anchor="middle" x="282.0" y="165.0">decode weights</text>
<rect x="380" y="132" width="124" height="56" rx="7" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" text-anchor="middle" x="442.0" y="165.0">reconstructed w</text>
<rect x="540" y="132" width="124" height="56" rx="7" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" text-anchor="middle" x="602.0" y="165.0">dot with x</text>
<line x1="184" y1="160" x2="220" y2="160" stroke="#17202a" stroke-width="3" marker-end="url(#arrow)" />
<line x1="344" y1="160" x2="380" y2="160" stroke="#17202a" stroke-width="3" marker-end="url(#arrow)" />
<line x1="504" y1="160" x2="540" y2="160" stroke="#17202a" stroke-width="3" marker-end="url(#arrow)" />
<rect x="368" y="220" width="148" height="42" rx="7" fill="#d9822b" opacity="0.14" stroke="#d9822b" />
<text class="small" text-anchor="middle" x="442" y="246">temporary weight buffer</text>
<text class="small" x="64" y="334">The one-sided LUT path removes the reconstructed-weight buffer.</text>
</svg>
