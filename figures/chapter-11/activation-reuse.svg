<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#17202a" />
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
    .title { font-size: 20px; font-weight: 700; }
    .label { font-size: 13px; }
    .small { font-size: 12px; fill: #566573; }
  </style>
<rect x="0" y="0" width="760" height="360" fill="#ffffff" />
<text class="title" x="48" y="32">One activation table reused across rows</text>
<rect x="70" y="130" width="120" height="60" rx="7" fill="#f8f9f9" stroke="#2f6f9f" stroke-width="2" />
<text class="label" text-anchor="middle" x="130.0" y="165.0">activation block</text>
<rect x="270" y="130" width="120" height="60" rx="7" fill="#f8f9f9" stroke="#2e8b57" stroke-width="2" />
<text class="label" text-anchor="middle" x="330.0" y="165.0">T_x table</text>
<rect x="500" y="74" width="150" height="38" rx="7" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" text-anchor="middle" x="575.0" y="98.0">row 0 HNLQ indices</text>
<line x1="390" y1="160" x2="500" y2="93" stroke="#17202a" stroke-width="2" marker-end="url(#arrow)" />
<rect x="500" y="130" width="150" height="38" rx="7" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" text-anchor="middle" x="575.0" y="154.0">row 1 HNLQ indices</text>
<line x1="390" y1="160" x2="500" y2="149" stroke="#17202a" stroke-width="2" marker-end="url(#arrow)" />
<rect x="500" y="186" width="150" height="38" rx="7" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" text-anchor="middle" x="575.0" y="210.0">row 2 HNLQ indices</text>
<line x1="390" y1="160" x2="500" y2="205" stroke="#17202a" stroke-width="2" marker-end="url(#arrow)" />
<rect x="500" y="242" width="150" height="38" rx="7" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" text-anchor="middle" x="575.0" y="266.0">row 3 HNLQ indices</text>
<line x1="390" y1="160" x2="500" y2="261" stroke="#17202a" stroke-width="2" marker-end="url(#arrow)" />
<line x1="190" y1="160" x2="270" y2="160" stroke="#17202a" stroke-width="3" marker-end="url(#arrow)" />
<text class="small" x="64" y="334">Matrix multiplication creates reuse: many rows can share the table for the same activation tile.</text>
</svg>
