<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
    .title { font-size: 20px; font-weight: 700; }
    .label { font-size: 13px; }
    .small { font-size: 12px; fill: #566573; }
  </style>
<rect x="0" y="0" width="760" height="360" fill="#ffffff" />
<text class="title" x="48" y="32">Calibration and evaluation loop</text>
<rect x="48" y="142" width="112" height="54" rx="7" fill="#f8f9f9" stroke="#d6dbdf" />
<text class="label" text-anchor="middle" x="104" y="174">weights</text>
<line x1="160" y1="169" x2="188" y2="169" stroke="#17202a" />
<rect x="188" y="142" width="112" height="54" rx="7" fill="#f8f9f9" stroke="#d6dbdf" />
<text class="label" text-anchor="middle" x="244" y="174">beta sweep</text>
<line x1="300" y1="169" x2="328" y2="169" stroke="#17202a" />
<rect x="328" y="142" width="112" height="54" rx="7" fill="#f8f9f9" stroke="#d6dbdf" />
<text class="label" text-anchor="middle" x="384" y="174">quantize</text>
<line x1="440" y1="169" x2="468" y2="169" stroke="#17202a" />
<rect x="468" y="142" width="112" height="54" rx="7" fill="#f8f9f9" stroke="#d6dbdf" />
<text class="label" text-anchor="middle" x="524" y="174">layer outputs</text>
<line x1="580" y1="169" x2="608" y2="169" stroke="#17202a" />
<rect x="608" y="142" width="112" height="54" rx="7" fill="#f8f9f9" stroke="#d6dbdf" />
<text class="label" text-anchor="middle" x="664" y="174">baseline report</text>
<text class="small" x="64" y="334">Real model claims require the same loop on real checkpoints and tasks.</text>
</svg>
