<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#17202a" />
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
    .title { font-size: 20px; font-weight: 700; }
    .label { font-size: 13px; }
    .small { font-size: 12px; fill: #566573; }
    .axis { stroke: #5d6d7e; stroke-width: 1.5; }
    .grid { stroke: #d6dbdf; stroke-width: 1; }
  </style>
<rect x="0" y="0" width="760" height="360" fill="#ffffff" />
<text class="title" x="48" y="32">Step 2: repair D4 parity</text>
<rect x="76" y="96" width="190" height="62" rx="6" fill="#f8f9f9" stroke="#d9822b" stroke-width="2" />
<text class="label" text-anchor="middle" x="171" y="133">(1, -2, 2, 0)</text>
<text class="small" text-anchor="middle" x="171" y="152">sum = 1, odd</text>
<line x1="286" y1="127" x2="458" y2="127" stroke="#17202a" stroke-width="3" marker-end="url(#arrow)" />
<text class="small" text-anchor="middle" x="372" y="112">change coordinate 4</text>
<rect x="480" y="96" width="190" height="62" rx="6" fill="#f8f9f9" stroke="#2e8b57" stroke-width="2" />
<text class="label" text-anchor="middle" x="575" y="133">(1, -2, 2, -1)</text>
<text class="small" text-anchor="middle" x="575" y="152">sum = 0, even</text>
<rect x="106" y="226" width="548" height="42" rx="6" fill="#8e44ad" opacity="0.13" stroke="#8e44ad" />
<text class="small" text-anchor="middle" x="380" y="252">coordinate 4 had the largest absolute rounding error: 0.45</text>
</svg>
