<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#17202a" />
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
    .title { font-size: 20px; font-weight: 700; }
    .label { font-size: 13px; }
    .small { font-size: 12px; fill: #566573; }
    .axis { stroke: #5d6d7e; stroke-width: 1.5; }
    .grid { stroke: #d6dbdf; stroke-width: 1; }
  </style>
<rect x="0" y="0" width="760" height="360" fill="#ffffff" />
<text class="title" x="48" y="32">Round-and-fix decoder flow</text>
<rect x="66" y="118" width="118" height="48" rx="7" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" text-anchor="middle" x="125" y="148">target v</text>
<rect x="214" y="118" width="118" height="48" rx="7" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" text-anchor="middle" x="273" y="148">round to u</text>
<rect x="362" y="118" width="118" height="48" rx="7" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" text-anchor="middle" x="421" y="148">sum even?</text>
<rect x="510" y="82" width="118" height="48" rx="7" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" text-anchor="middle" x="569" y="112">return u</text>
<rect x="510" y="154" width="118" height="48" rx="7" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" text-anchor="middle" x="569" y="184">repair largest error</text>
<line x1="184" y1="142" x2="214" y2="142" stroke="#17202a" stroke-width="3" marker-end="url(#arrow)" />
<line x1="332" y1="142" x2="362" y2="142" stroke="#17202a" stroke-width="3" marker-end="url(#arrow)" />
<line x1="480" y1="130" x2="510" y2="106" stroke="#17202a" stroke-width="3" marker-end="url(#arrow)" />
<line x1="480" y1="154" x2="510" y2="178" stroke="#17202a" stroke-width="3" marker-end="url(#arrow)" />
<text class="small" x="486" y="112">yes</text>
<text class="small" x="486" y="176">no</text>
<line x1="569" y1="202" x2="569" y2="246" stroke="#17202a" stroke-width="3" marker-end="url(#arrow)" />
<rect x="510" y="250" width="118" height="48" rx="7" fill="#f8f9f9" stroke="#2e8b57" stroke-width="2" />
<text class="label" text-anchor="middle" x="569" y="280">return fixed u</text>
<text class="small" x="68" y="314">The decoder needs one pass over the coordinates and at most one coordinate update.</text>
</svg>
