<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#17202a" />
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
    .title { font-size: 20px; font-weight: 700; }
    .label { font-size: 13px; }
    .small { font-size: 12px; fill: #566573; }
    .axis { stroke: #5d6d7e; stroke-width: 1.5; }
    .grid { stroke: #d6dbdf; stroke-width: 1; }
  </style>
<rect x="0" y="0" width="760" height="360" fill="#ffffff" />
<text class="title" x="48" y="32">D4 generator basis</text>
<rect x="72" y="92" width="140" height="96" rx="6" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="title" text-anchor="middle" x="142" y="126">g1</text>
<text class="small" text-anchor="middle" x="142" y="158">(1, -1, 0, 0)</text>
<text class="small" text-anchor="middle" x="142" y="178">even sum</text>
<rect x="237" y="92" width="140" height="96" rx="6" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="title" text-anchor="middle" x="307" y="126">g2</text>
<text class="small" text-anchor="middle" x="307" y="158">(0, 1, -1, 0)</text>
<text class="small" text-anchor="middle" x="307" y="178">even sum</text>
<rect x="402" y="92" width="140" height="96" rx="6" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="title" text-anchor="middle" x="472" y="126">g3</text>
<text class="small" text-anchor="middle" x="472" y="158">(0, 0, 1, -1)</text>
<text class="small" text-anchor="middle" x="472" y="178">even sum</text>
<rect x="567" y="92" width="140" height="96" rx="6" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="title" text-anchor="middle" x="637" y="126">g4</text>
<text class="small" text-anchor="middle" x="637" y="158">(0, 0, 1, 1)</text>
<text class="small" text-anchor="middle" x="637" y="178">even sum</text>
<text class="small" x="74" y="260">The columns of G are these basis vectors. Integer combinations generate D4.</text>
</svg>
