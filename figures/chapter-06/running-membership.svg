<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#17202a" />
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
    .title { font-size: 20px; font-weight: 700; }
    .label { font-size: 13px; }
    .small { font-size: 12px; fill: #566573; }
    .axis { stroke: #5d6d7e; stroke-width: 1.5; }
    .grid { stroke: #d6dbdf; stroke-width: 1; }
  </style>
<rect x="0" y="0" width="760" height="360" fill="#ffffff" />
<text class="title" x="48" y="32">Running blocks under the D4 parity test</text>
<rect x="72" y="92" width="250" height="58" rx="6" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" x="94" y="127">(1, -2, 2, 0)</text>
<line x1="338" y1="121" x2="442" y2="121" stroke="#17202a" stroke-width="3" marker-end="url(#arrow)" />
<rect x="462" y="92" width="96" height="58" rx="6" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" text-anchor="middle" x="510" y="127">sum = 1</text>
<rect x="586" y="92" width="112" height="58" rx="6" fill="#d9822b" opacity="0.16" stroke="#d9822b" stroke-width="2" />
<text class="label" text-anchor="middle" x="642" y="127">outside D4</text>
<rect x="72" y="190" width="250" height="58" rx="6" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" x="94" y="225">(1, 0, -2, 3)</text>
<line x1="338" y1="219" x2="442" y2="219" stroke="#17202a" stroke-width="3" marker-end="url(#arrow)" />
<rect x="462" y="190" width="96" height="58" rx="6" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" text-anchor="middle" x="510" y="225">sum = 2</text>
<rect x="586" y="190" width="112" height="58" rx="6" fill="#2e8b57" opacity="0.16" stroke="#2e8b57" stroke-width="2" />
<text class="label" text-anchor="middle" x="642" y="225">inside D4</text>
<text class="small" x="72" y="304">D4 membership is determined by parity of the coordinate sum.</text>
</svg>
