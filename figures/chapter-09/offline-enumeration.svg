<rect x="354" y="132" width="118" height="54" rx="7" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" text-anchor="middle" x="413" y="164">compute bits</text>
<rect x="502" y="132" width="118" height="54" rx="7" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
