<line x1="324" y1="159" x2="354" y2="159" stroke="#17202a" stroke-width="3" marker-end="url(#arrow)" />
<line x1="472" y1="159" x2="502" y2="159" stroke="#17202a" stroke-width="3" marker-end="url(#arrow)" />
<line x1="561" y1="186" x2="630" y2="224" stroke="#17202a" stroke-width="3" marker-end="url(#arrow)" />
<rect x="68" y="246" width="446" height="42" rx="7" fill="#8e44ad" opacity="0.12" stroke="#8e44ad" />
<text class="small" text-anchor="middle" x="291" y="272">verify exactly one representative for each index 0 through 15</text>
