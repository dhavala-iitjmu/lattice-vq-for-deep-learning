<rect x="0" y="0" width="760" height="360" fill="#ffffff" />
<text class="title" x="48" y="32">Offline codebook generation</text>
<rect x="58" y="132" width="118" height="54" rx="7" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
