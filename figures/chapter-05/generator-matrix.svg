<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#17202a" />
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
    .title { font-size: 20px; font-weight: 700; }
    .label { font-size: 13px; }
    .small { font-size: 12px; fill: #566573; }
    .axis { stroke: #5d6d7e; stroke-width: 1.5; }
    .grid { stroke: #d6dbdf; stroke-width: 1; }
  </style>
<rect x="0" y="0" width="760" height="360" fill="#ffffff" />
<text class="title" x="48" y="32">Generator matrix as a point generator</text>
<rect x="70" y="110" width="150" height="90" rx="6" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" text-anchor="middle" x="145" y="145">integer</text>
<text class="label" text-anchor="middle" x="145" y="170">coefficients z</text>
<line x1="230" y1="155" x2="332" y2="155" stroke="#17202a" stroke-width="3" marker-end="url(#arrow)" />
<rect x="350" y="96" width="160" height="118" rx="6" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="title" text-anchor="middle" x="430" y="137">G</text>
<text class="small" text-anchor="middle" x="430" y="164">basis vectors</text>
<text class="small" text-anchor="middle" x="430" y="184">as columns</text>
<line x1="520" y1="155" x2="622" y2="155" stroke="#17202a" stroke-width="3" marker-end="url(#arrow)" />
<rect x="640" y="110" width="70" height="90" rx="6" fill="#f8f9f9" stroke="#d6dbdf" stroke-width="2" />
<text class="label" text-anchor="middle" x="675" y="145">point</text>
<text class="label" text-anchor="middle" x="675" y="170">Gz</text>
<text class="small" x="74" y="274">The matrix is the recipe. The integer vector chooses the recipe inputs.</text>
</svg>
